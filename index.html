<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Documentos · ALEN+PRO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f2;color:#1a1a1a;font-size:15px;line-height:1.5}
.header{background:#1a1a1a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;position:relative;flex:0 0 auto}
.logo::before,.logo::after{content:"";position:absolute;background:#FFD400;border-radius:2px}
.logo::before{width:10px;height:32px;left:11px;top:0}
.logo::after{height:10px;width:32px;top:11px;left:0}
.header h1{font-size:16px;font-weight:700}
.header p{font-size:11px;opacity:.5;margin-top:2px}
.conn{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#888;flex:0 0 auto}
.dot.online{background:#4caf50}.dot.local{background:#ff9800}
.main{max-width:820px;margin:0 auto;padding:20px 16px 40px}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#555;border-bottom:2px solid #FFD400;padding-bottom:8px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:#444;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.field select,.field input{width:100%;padding:10px 12px;border:1.5px solid #ccc;border-radius:8px;font-size:15px;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#1a1a1a}
.field select:focus,.field input:focus{outline:none;border-color:#FFD400;box-shadow:0 0 0 3px #fff6cc}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.codigo-display{background:#1a1a1a;color:#FFD400;font-size:26px;font-weight:700;text-align:center;padding:16px;border-radius:10px;letter-spacing:4px;font-family:'Courier New',monospace}
.codigo-sub{text-align:center;font-size:12px;color:#888;margin-top:8px}
.badge{display:inline-block;background:#fff6cc;color:#7a5f00;border:1px solid #FFD400;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;margin:4px 2px}
.badges{text-align:center;margin-top:6px}
.btn-gen{width:100%;padding:14px;background:#FFD400;color:#1a1a1a;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:Arial}
.btn-gen:hover{background:#e6c000}
.btn-gen:disabled{opacity:.5;cursor:not-allowed}
.estado{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.estado.ok{display:block;background:#e8f5e9;color:#2e7d32}
.estado.err{display:block;background:#ffebee;color:#c62828}
.tbl-wrap{overflow-x:auto}
table.reg{width:100%;border-collapse:collapse;font-size:12px;min-width:580px}
table.reg th{background:#fff6cc;font-size:11px;text-transform:uppercase;padding:7px 8px;border:1px solid #ddd;text-align:left}
table.reg td{padding:6px 8px;border:1px solid #ddd}
table.reg td.code{font-family:'Courier New',monospace;font-weight:700}
.row-btns{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.btn-sec{padding:9px 14px;background:#fff;color:#444;border:1.5px solid #ccc;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial}
.btn-sec:hover{background:#f5f5f5}
.nota{font-size:12px;color:#888;line-height:1.6}
@media(max-width:580px){.grid2,.grid3{grid-template-columns:1fr}.codigo-display{font-size:18px}}
</style>
</head>
<body>

<div class="header">
  <div class="logo"></div>
  <div>
    <h1>Generador de Documentos</h1>
    <p>Sistema de Gestión · ALEN+PRO</p>
  </div>
  <div class="conn">
    <span class="dot" id="dot"></span>
    <span id="connTxt">Iniciando…</span>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">1 · Datos del documento</div>
    <div class="grid2">
      <div class="field">
        <label>Tipo de documento</label>
        <select id="tipo"></select>
      </div>
      <div class="field">
        <label>Área responsable</label>
        <select id="area"></select>
      </div>
    </div>
    <div class="field">
      <label>Nombre del documento</label>
      <input type="text" id="nombre" placeholder="Ej. Procedimiento de Recepción de Materia Prima">
    </div>
    <div class="grid3">
      <div class="field">
        <label>Versión</label>
        <input type="text" id="version" value="00" maxlength="2">
      </div>
      <div class="field">
        <label>Fecha aprobación (MM-AAAA)</label>
        <input type="text" id="fechaAprob" placeholder="06-2026">
      </div>
      <div class="field">
        <label>Tiempo de retención</label>
        <select id="retencion">
          <option>Año Vigente</option>
          <option>1 año</option>
          <option>2 años</option>
          <option>5 años</option>
          <option>10 años</option>
          <option>Permanente</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">2 · Código asignado</div>
    <div class="codigo-display" id="codigoBox">—</div>
    <div class="codigo-sub" id="codigoSub">Selecciona tipo y área</div>
    <div class="badges" id="badges"></div>
  </div>

  <div class="card">
    <div class="card-title">3 · Control de firmas</div>
    <div class="grid3">
      <div class="field"><label>Elaboró</label><input type="text" id="elabN" placeholder="Nombre completo"></div>
      <div class="field"><label>Revisó</label><input type="text" id="revN" placeholder="Nombre completo"></div>
      <div class="field"><label>Aprobó</label><input type="text" id="aprN" value="Rodrigo Gutiérrez Vásquez"></div>
    </div>
    <div class="grid3">
      <div class="field"><label>Cargo</label><input type="text" id="elabC" placeholder="Cargo"></div>
      <div class="field"><label>Cargo</label><input type="text" id="revC" placeholder="Cargo"></div>
      <div class="field"><label>Cargo</label><input type="text" id="aprC" value="Gerente General"></div>
    </div>
    <p class="nota" id="firmasNota" style="margin-top:6px"></p>
  </div>

  <button class="btn-gen" id="btnGen">⬇ Reservar consecutivo y generar documento</button>
  <div class="estado" id="estado"></div>

  <div class="card" style="margin-top:16px">
    <div class="card-title">4 · Registro generado</div>
    <div class="tbl-wrap" id="regWrap"><p class="nota">Aún no se han generado documentos.</p></div>
    <div class="row-btns">
      <button class="btn-sec" id="btnCsv">Exportar CSV</button>
      <button class="btn-sec" id="btnClr">Limpiar registro</button>
    </div>
  </div>

</div>

<script>
/* ===== CATÁLOGOS ===== */
const TIPOS = [
  {s:"ACT",n:"Acta",          f:false,c:false},
  {s:"BDD",n:"Base de datos", f:false,c:false},
  {s:"CIR",n:"Circular",      f:false,c:false},
  {s:"COM",n:"Comunicado",    f:false,c:false},
  {s:"CRO",n:"Cronograma",    f:false,c:false},
  {s:"FOR",n:"Formato",       f:false,c:false},
  {s:"INS",n:"Instructivo",   f:true, c:true},
  {s:"INV",n:"Inventario",    f:false,c:false},
  {s:"MAN",n:"Manual",        f:true, c:true},
  {s:"MAT",n:"Matriz",        f:false,c:false},
  {s:"MEM",n:"Memorando",     f:false,c:false},
  {s:"PLA",n:"Plan",          f:true, c:true},
  {s:"POL",n:"Política",      f:true, c:true},
  {s:"PRG",n:"Programa",      f:true, c:true},
  {s:"PRO",n:"Procedimiento", f:true, c:true},
  {s:"PRT",n:"Protocolo",     f:true, c:true},
];

const AREAS = [
  {s:"AD",n:"Administración"},
  {s:"AM",n:"Ambiental"},
  {s:"CA",n:"Calidad"},
  {s:"CO",n:"Comercial"},
  {s:"CT",n:"Contabilidad"},
  {s:"GG",n:"Gerencia"},
  {s:"PL",n:"Planeación"},
  {s:"PR",n:"Producción"},
  {s:"ST",n:"SST"},
  {s:"TH",n:"Talento Humano"},
];

/* ===== FIREBASE (con respaldo local) ===== */
let modo = "local", fbDB = null;

async function initFirebase(){
  try{
    const {initializeApp} = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const db = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
    const app = initializeApp({databaseURL:"https://alenpro-inventario-default-rtdb.firebaseio.com"});
    fbDB = {db:db.getDatabase(app),...db};
    modo = "online";
  }catch(e){ modo = "local"; }
  const dot = document.getElementById("dot");
  const txt = document.getElementById("connTxt");
  dot.className = "dot " + (modo==="online"?"online":"local");
  txt.textContent = modo==="online" ? "Firebase conectado" : "Modo local";
}

async function reservar(t,a){
  const key = t+"-"+a;
  if(modo==="online"){
    const ref = fbDB.ref(fbDB.db,"consecutivos/"+key);
    const res = await fbDB.runTransaction(ref, v=>(v||0)+1);
    return res.snapshot.val();
  }
  const s = JSON.parse(localStorage.getItem("ap_consec")||"{}");
  s[key] = (s[key]||0)+1;
  localStorage.setItem("ap_consec",JSON.stringify(s));
  return s[key];
}

async function guardarReg(e){
  if(modo==="online") await fbDB.push(fbDB.ref(fbDB.db,"registro_documental"),e);
  const r = JSON.parse(localStorage.getItem("ap_reg")||"[]");
  r.unshift(e);
  localStorage.setItem("ap_reg",JSON.stringify(r));
}

/* ===== HELPERS ===== */
const $ = id => document.getElementById(id);
const tipoSel = () => TIPOS.find(t=>t.s===$("tipo").value);
const areaSel = () => AREAS.find(a=>a.s===$("area").value);

function llenar(){
  $("tipo").innerHTML = TIPOS.map(t=>`<option value="${t.s}">${t.s} · ${t.n}</option>`).join("");
  $("area").innerHTML = AREAS.map(a=>`<option value="${a.s}">${a.s} · ${a.n}</option>`).join("");
}

async function preview(){
  const t = tipoSel(), a = areaSel();
  const key = t.s+"-"+a.s;
  let num = 1;
  if(modo==="online"){
    try{ const snap=await fbDB.get(fbDB.ref(fbDB.db,"consecutivos/"+key)); num=(snap.val()||0)+1; }catch(e){}
  } else {
    const s = JSON.parse(localStorage.getItem("ap_consec")||"{}");
    num = (s[key]||0)+1;
  }
  const cod = `${t.s}-${a.s}-${String(num).padStart(3,"0")}`;
  $("codigoBox").textContent = cod;
  $("codigoSub").textContent = `${t.n} · ${a.n} · próximo número (no reservado aún)`;
  const b = [];
  if(t.f) b.push('<span class="badge">✔ control de firmas</span>');
  if(t.c) b.push('<span class="badge">✔ control de cambios</span>');
  $("badges").innerHTML = b.join("");
  $("firmasNota").textContent = t.f
    ? "Este tipo requiere bloque de firmas (Elaboró / Revisó / Aprobó)."
    : "Este tipo no requiere bloque de firmas formal.";
}

function setEstado(msg,ok){
  const e=$("estado"); e.textContent=msg; e.className="estado "+(ok?"ok":"err");
}

/* ===== GENERACIÓN CSV (descarga el registro) ===== */
function exportCSV(){
  const reg = JSON.parse(localStorage.getItem("ap_reg")||"[]");
  if(!reg.length){ alert("No hay documentos registrados aún."); return; }
  const cols = ["codigo","nombre","tipo","area","ver","fechaA","ret","elaboro","reviso","aprobo","gen"];
  const head = ["CODIGO","NOMBRE","TIPO","AREA","VERSION","FECHA APROBACION","RETENCION","ELABORO","REVISO","APROBO","FECHA GENERACION"];
  const rows = reg.map(r=>cols.map(c=>`"${(r[c]||"").replace(/"/g,'""')}"`).join(","));
  const csv = "\uFEFF"+head.join(",")+"\n"+rows.join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = "registro_documental_alenpro.csv";
  a.click();
}

/* ===== REGISTRO UI ===== */
function pintarReg(){
  const reg = JSON.parse(localStorage.getItem("ap_reg")||"[]");
  if(!reg.length){ $("regWrap").innerHTML='<p class="nota">Aún no se han generado documentos.</p>'; return; }
  $("regWrap").innerHTML = `<table class="reg"><thead><tr>
    <th>Código</th><th>Nombre</th><th>Tipo</th><th>Área</th><th>Ver.</th><th>Aprobación</th><th>Retención</th><th>Generado</th>
  </tr></thead><tbody>`+
  reg.map(r=>`<tr>
    <td class="code">${r.codigo}</td><td>${r.nombre}</td><td>${r.tipo}</td><td>${r.area}</td>
    <td>${r.ver}</td><td>${r.fechaA||"—"}</td><td>${r.ret}</td><td>${r.gen}</td>
  </tr>`).join("")+"</tbody></table>";
}

/* ===== GENERAR DOCUMENTO (descarga HTML imprimible) ===== */
async function onGenerar(){
  const nombre = $("nombre").value.trim();
  if(!nombre){ setEstado("⚠ Escribe el nombre del documento.",false); return; }
  $("btnGen").disabled = true;
  setEstado("Reservando consecutivo…",true);
  try{
    const t = tipoSel(), a = areaSel();
    const num = await reservar(t.s,a.s);
    const codigo = `${t.s}-${a.s}-${String(num).padStart(3,"0")}`;
    const now = new Date();
    const hoy = `${String(now.getDate()).padStart(2,"0")}-${String(now.getMonth()+1).padStart(2,"0")}-${now.getFullYear()}`;
    const ver = $("version").value.trim()||"00";
    const fechaA = $("fechaAprob").value.trim();
    const elabN=$("elabN").value.trim(), elabC=$("elabC").value.trim();
    const revN=$("revN").value.trim(),   revC=$("revC").value.trim();
    const aprN=$("aprN").value.trim(),   aprC=$("aprC").value.trim();

    const entry = {
      codigo, nombre, tipo:t.n, area:a.n, ver, fechaA,
      ret:$("retencion").value,
      elaboro:[elabN,elabC].filter(Boolean).join(" / "),
      reviso:[revN,revC].filter(Boolean).join(" / "),
      aprobo:[aprN,aprC].filter(Boolean).join(" / "),
      gen:now.toLocaleString("es-CO")
    };
    await guardarReg(entry);

    /* Genera HTML imprimible (sin dependencia externa) */
    const firmasHTML = t.f ? `
      <h3 style="margin-top:32px">CONTROL DE FIRMAS</h3>
      <table style="width:100%;border-collapse:collapse">
        <tr>
          ${["ELABORÓ","REVISÓ","APROBÓ"].map((rol,i)=>{
            const nom=[elabN,revN,aprN][i]||"_______________";
            const car=[elabC,revC,aprC][i]||"";
            return `<td style="border:1px solid #000;padding:16px 12px;text-align:center;width:33%">
              <b>${rol}</b><br><br>${nom}<br><small>${car}</small></td>`;
          }).join("")}
        </tr>
      </table>` : "";

    const cambiosHTML = t.c ? `
      <h3 style="margin-top:32px">CONTROL DE CAMBIOS</h3>
      <table style="width:100%;border-collapse:collapse">
        <tr>
          <th style="border:1px solid #000;padding:8px;background:#fff6cc">FECHA</th>
          <th style="border:1px solid #000;padding:8px;background:#fff6cc">DESCRIPCIÓN DEL CAMBIO</th>
          <th style="border:1px solid #000;padding:8px;background:#fff6cc">VERSIÓN</th>
        </tr>
        <tr>
          <td style="border:1px solid #000;padding:8px">${hoy}</td>
          <td style="border:1px solid #000;padding:8px">Creación del documento</td>
          <td style="border:1px solid #000;padding:8px;text-align:center">${ver}</td>
        </tr>
      </table>` : "";

    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>${codigo} · ${nombre}</title>
<style>
  body{font-family:Arial,sans-serif;font-size:12pt;margin:2cm;color:#000}
  table.enc{width:100%;border-collapse:collapse;margin-bottom:24px}
  table.enc td{border:1px solid #000;padding:8px 10px;vertical-align:middle}
  .logo-cel{width:130pt;text-align:center;font-size:9pt;color:#999}
  h2{font-size:13pt;margin:20px 0 6px}
  h3{font-size:11pt;margin:20px 0 6px}
  p.placeholder{color:#aaa;font-style:italic}
  @media print{body{margin:1.5cm}}
</style></head><body>
<table class="enc">
  <tr>
    <td class="logo-cel" rowspan="4">[ LOGO<br>ALEN+PRO ]</td>
    <td colspan="2" style="text-align:center;font-weight:bold">ALIMENTO ENERGÉTICO PROTEICO S.A.S.</td>
  </tr>
  <tr><td colspan="2" style="text-align:center;font-weight:bold">${nombre.toUpperCase()}</td></tr>
  <tr>
    <td>Código: <b>${codigo}</b></td>
    <td>Versión: <b>${ver}</b></td>
  </tr>
  <tr>
    <td>Fecha de aprobación: <b>${fechaA||"MM-AAAA"}</b></td>
    <td>Página: _____ de _____</td>
  </tr>
</table>

<h2>OBJETIVO</h2>
<p class="placeholder">[Escriba aquí el objetivo del documento.]</p>

<h2>ALCANCE</h2>
<p class="placeholder">[Defina el alcance del documento.]</p>

<h2>DESARROLLO</h2>
<p class="placeholder">[Desarrolle el contenido aquí.]</p>

${firmasHTML}
${cambiosHTML}

<div style="margin-top:40px;border-top:1px solid #000;padding-top:8px;text-align:center;font-size:9pt;color:#555">
  Alimento Energético Proteico S.A.S. · Corregimiento Puerto Caldas – Paraje La Marina – Planta ALEN+PRO<br>
  Pereira – Risaralda | www.alenpro.co
</div>
</body></html>`;

    const blob = new Blob([html],{type:"text/html;charset=utf-8"});
    const urlB = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = urlB;
    link.download = `${codigo}_${nombre.replace(/[^a-zA-ZáéíóúñÁÉÍÓÚÑ0-9 ]/g,"").replace(/\s+/g,"_")}.html`;
    link.click();
    URL.revokeObjectURL(urlB);

    pintarReg();
    $("codigoBox").textContent = codigo;
    $("codigoSub").textContent = `✓ Reservado · ${t.n} · ${a.n}`;
    setEstado(`✓ Documento ${codigo} generado. Ábrelo en Word o imprímelo desde el navegador.`,true);
    await preview();
  }catch(err){ setEstado("Error: "+err.message,false); }
  $("btnGen").disabled = false;
}

/* ===== INIT ===== */
window.addEventListener("DOMContentLoaded", async ()=>{
  llenar();
  $("tipo").addEventListener("change", preview);
  $("area").addEventListener("change", preview);
  $("btnGen").addEventListener("click", onGenerar);
  $("btnCsv").addEventListener("click", exportCSV);
  $("btnClr").addEventListener("click",()=>{ localStorage.removeItem("ap_reg"); pintarReg(); });
  await initFirebase();
  await preview();
  pintarReg();
});
</script>
</body>
</html>
